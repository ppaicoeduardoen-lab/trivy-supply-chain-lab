name: Release Vulnerable Workflow

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar scripts
        run: chmod +x scripts/*.sh

      - name: Construir artefacto
        run: ./scripts/build_artifact.sh "${GITHUB_REF_NAME:-v1.0.0}"

      - name: Publicar en registry simulado
        run: ./scripts/publish_to_registry.sh "${GITHUB_REF_NAME:-v1.0.0}"

      - name: Mostrar hashes
        run: sha256sum dist/* registry/docker/* registry/npm/* registry/pypi/*

      - name: Advertencia de permisos
        run: |
          echo "[RIESGO] Este workflow usa contents: write y packages: write."
          echo "[RIESGO] En un compromiso real, estos permisos deben estar separados y protegidos."