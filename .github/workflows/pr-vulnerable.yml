name: PR Vulnerable Workflow

on:
  pull_request_target:
    branches:
      - main

jobs:
  vulnerable-pr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código enviado por el Pull Request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Ejecutar scanner simulado
        run: |
          echo "[INFO] Ejecutando scanner en workflow vulnerable"
          go run ./cmd/trivy-lab samples/vulnerable.env

      - name: Verificar existencia de secret falso
        env:
          LAB_FAKE_TOKEN: ${{ secrets.LAB_FAKE_TOKEN }}
        run: |
          echo "[INFO] Verificando secret falso"
          if [ -n "$LAB_FAKE_TOKEN" ]; then
            echo "[RIESGO] El workflow tiene acceso a un secret."
            echo "[INFO] No se imprime el valor real."
          else
            echo "[OK] No hay secret disponible."
          fi